name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: diff
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed: $CHANGED"
          if echo "$CHANGED" | grep -qE '^(apps/api/|packages/|docker/api\.Dockerfile|pnpm-lock\.yaml)' || [ "$CHANGED" = "all" ]; then
            echo "api=true" >> $GITHUB_OUTPUT
          else
            echo "api=false" >> $GITHUB_OUTPUT
          fi

      - name: Rebuild & restart API
        if: steps.diff.outputs.api == 'true'
        working-directory: /opt/iiiiibox
        run: |
          docker compose build api
          docker compose up -d api

      - name: Ensure base services running
        working-directory: /opt/iiiiibox
        run: docker compose ps
