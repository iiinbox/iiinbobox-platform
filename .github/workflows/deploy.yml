name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  deploy:
    name: Deploy to production
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: diff
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed: $CHANGED"
          if echo "$CHANGED" | grep -qE '^(apps/api/|packages/|docker/api\.Dockerfile|pnpm-lock\.yaml)' || [ "$CHANGED" = "all" ]; then
            echo "api=true" >> $GITHUB_OUTPUT
          else
            echo "api=false" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE '^(k8s/)' || [ "$CHANGED" = "all" ]; then
            echo "infra=true" >> $GITHUB_OUTPUT
          else
            echo "infra=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        if: steps.diff.outputs.api == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        if: steps.diff.outputs.api == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rolling restart API in Kubernetes
        if: steps.diff.outputs.api == 'true'
        run: kubectl rollout restart deployment/api -n iiiiibox

      - name: Apply K8s manifests
        if: steps.diff.outputs.infra == 'true'
        run: kubectl apply -f k8s/

      - name: Ensure base services running
        run: kubectl rollout status deployment/postgres -n iiiiibox --timeout=60s || true
