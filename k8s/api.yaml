apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: iiiiibox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: ghcr.io/iiinbox/iiinbobox-platform/api:latest
        imagePullPolicy: Always
        envFrom:
        - secretRef:
            name: iiiiibox-secrets
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "4000"
        ports:
        - containerPort: 4000
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: iiiiibox
spec:
  selector:
    app: api
  ports:
  - port: 4000
    targetPort: 4000
