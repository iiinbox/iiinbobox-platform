name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy API / infra changes
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: diff
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed: $CHANGED"
          if echo "$CHANGED" | grep -qE '^(apps/api/|packages/|docker/api\.Dockerfile|pnpm-lock\.yaml)' || [ "$CHANGED" = "all" ]; then
            echo "api=true" >> $GITHUB_OUTPUT
          else
            echo "api=false" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE '^(docker/Caddyfile|docker/caddy\.Dockerfile|docker-compose\.yml)' || [ "$CHANGED" = "all" ]; then
            echo "infra=true" >> $GITHUB_OUTPUT
          else
            echo "infra=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync infra files to server
        if: steps.diff.outputs.api == 'true' || steps.diff.outputs.infra == 'true'
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.next' \
            --exclude='.turbo' \
            --exclude='.env' \
            --exclude='.env.local' \
            $GITHUB_WORKSPACE/ /opt/iiiiibox/

      - name: Start infrastructure
        if: steps.diff.outputs.api == 'true' || steps.diff.outputs.infra == 'true'
        working-directory: /opt/iiiiibox
        run: docker compose up -d postgres minio meilisearch

      - name: Wait for postgres
        if: steps.diff.outputs.api == 'true'
        working-directory: /opt/iiiiibox
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready && break; sleep 1
          done

      - name: Rebuild & restart API
        if: steps.diff.outputs.api == 'true'
        working-directory: /opt/iiiiibox
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker compose build api
          docker compose up -d api

      - name: Rebuild & restart Caddy
        if: steps.diff.outputs.infra == 'true'
        working-directory: /opt/iiiiibox
        run: |
          docker compose build caddy
          docker compose up -d --remove-orphans caddy
