name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync code to server
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.next' \
            --exclude='.turbo' \
            --exclude='.env' \
            --exclude='.env.local' \
            $GITHUB_WORKSPACE/ /opt/iiiiibox/

      - name: Detect changed services
        id: diff
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Files changed: $CHANGED"
          # Infra = Dockerfile or docker-compose changed → need full Docker rebuild
          echo "$CHANGED" | grep -qE '^(docker/|docker-compose\.yml|pnpm-lock\.yaml)' \
            && echo "infra=true" >> $GITHUB_OUTPUT || echo "infra=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -qE '^(apps/api/|packages/)' || [ "$CHANGED" = "all" ] \
            && echo "api=true" >> $GITHUB_OUTPUT  || echo "api=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -qE '^(apps/web/|packages/)' || [ "$CHANGED" = "all" ] \
            && echo "web=true" >> $GITHUB_OUTPUT  || echo "web=false" >> $GITHUB_OUTPUT

      # ── Infrastructure ───────────────────────────────────────────
      - name: Start infrastructure
        working-directory: /opt/iiiiibox
        run: docker compose up -d postgres minio meilisearch

      - name: Wait for postgres
        working-directory: /opt/iiiiibox
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready && break; sleep 1
          done

      # ── API: Docker rebuild (runs on API or infra changes) ────────
      - name: Rebuild & restart API
        if: steps.diff.outputs.api == 'true' || steps.diff.outputs.infra == 'true'
        working-directory: /opt/iiiiibox
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker compose build api
          docker compose up -d api

      # ── Web: build on host, inject into container — no Docker build ──
      - name: Install dependencies (uses cached node_modules)
        if: steps.diff.outputs.web == 'true'
        working-directory: /opt/iiiiibox
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build Next.js on host (uses Turborepo cache)
        if: steps.diff.outputs.web == 'true'
        working-directory: /opt/iiiiibox
        run: |
          export NEXT_PUBLIC_API_URL=$(grep "^NEXT_PUBLIC_API_URL=" .env | cut -d= -f2-)
          pnpm turbo build --filter=@iiiiibox/web

      - name: Rebuild web Docker image (only when Dockerfile/lockfile changed)
        if: steps.diff.outputs.infra == 'true'
        working-directory: /opt/iiiiibox
        env:
          DOCKER_BUILDKIT: "1"
        run: docker compose build web

      - name: Inject new build into running web container
        if: steps.diff.outputs.web == 'true' && steps.diff.outputs.infra != 'true'
        working-directory: /opt/iiiiibox
        run: |
          docker compose up -d web
          WEB=$(docker compose ps -q web)
          docker cp apps/web/.next/standalone/. $WEB:/app/
          docker cp apps/web/.next/static/.   $WEB:/app/apps/web/.next/static/
          docker cp apps/web/public/.         $WEB:/app/apps/web/public/
          docker compose restart web

      # ── Finalize ─────────────────────────────────────────────────
      - name: Bring up all services
        working-directory: /opt/iiiiibox
        run: |
          docker compose up -d --remove-orphans
          docker image prune -f
          echo "Deploy complete $(date)"
