name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync code to server
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.next' \
            --exclude='.env' \
            --exclude='.env.local' \
            $GITHUB_WORKSPACE/ /opt/iiiiibox/

      - name: Detect changed services
        id: diff
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -qE '^(apps/api/|packages/)' || [ "$CHANGED" = "all" ]; then
            echo "api=true" >> $GITHUB_OUTPUT
          else
            echo "api=false" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | grep -qE '^(apps/web/|packages/)' || [ "$CHANGED" = "all" ]; then
            echo "web=true" >> $GITHUB_OUTPUT
          else
            echo "web=false" >> $GITHUB_OUTPUT
          fi

      - name: Start infrastructure
        working-directory: /opt/iiiiibox
        run: docker compose up -d postgres minio meilisearch

      - name: Wait for postgres
        working-directory: /opt/iiiiibox
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready && break
            sleep 1
          done

      - name: Build changed images
        working-directory: /opt/iiiiibox
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
        run: |
          SVCS=""
          [ "${{ steps.diff.outputs.api }}" = "true" ] && SVCS="$SVCS api"
          [ "${{ steps.diff.outputs.web }}" = "true" ] && SVCS="$SVCS web"
          SVCS="${SVCS## }"
          if [ -n "$SVCS" ]; then
            echo "Building: $SVCS"
            docker compose build --parallel $SVCS
          else
            echo "No app changes — skipping image build"
          fi

      - name: Start all services
        working-directory: /opt/iiiiibox
        run: |
          docker compose up -d --remove-orphans
          docker image prune -f
          echo "Deploy complete $(date)"
