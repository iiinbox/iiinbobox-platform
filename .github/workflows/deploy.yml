name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Ensure .env exists
        run: |
          if [ ! -f /opt/iiiiibox/.env ]; then
            echo "ERROR: /opt/iiiiibox/.env not found — create it from .env.example before deploying"
            exit 1
          fi

      - name: Copy code to deployment directory
        run: |
          rsync -a --exclude='.git' --exclude='node_modules' --exclude='dist' --exclude='.next' \
            $GITHUB_WORKSPACE/ /opt/iiiiibox/

      - name: Build and deploy
        working-directory: /opt/iiiiibox
        run: |
          set -e

          # Install dependencies
          corepack enable
          pnpm install --frozen-lockfile

          # Build packages in dependency order
          DATABASE_URL=$(grep DATABASE_URL .env | cut -d= -f2-) pnpm turbo build \
            --filter=@iiiiibox/shared-types \
            --filter=@iiiiibox/database \
            --filter=@iiiiibox/api-client

          # Build and restart containers
          docker compose build --parallel api web
          docker compose run --rm api sh -c "pnpm --filter @iiiiibox/database exec prisma migrate deploy"
          docker compose up -d --remove-orphans
          docker image prune -f

          echo "Deploy complete at $(date)"
