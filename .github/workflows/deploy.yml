name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to production
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Ensure .env exists
        run: |
          if [ ! -f /opt/iiiiibox/.env ]; then
            echo "ERROR: /opt/iiiiibox/.env not found"
            exit 1
          fi

      - name: Copy code to deployment directory
        run: |
          rsync -a \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.next' \
            --exclude='.env' \
            --exclude='.env.local' \
            $GITHUB_WORKSPACE/ /opt/iiiiibox/

      - name: Install dependencies
        working-directory: /opt/iiiiibox
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build shared packages
        working-directory: /opt/iiiiibox
        run: |
          export DATABASE_URL=$(grep "^DATABASE_URL" .env | cut -d= -f2-)
          pnpm turbo build \
            --filter=@iiiiibox/shared-types \
            --filter=@iiiiibox/database \
            --filter=@iiiiibox/api-client

      - name: Start infrastructure containers
        working-directory: /opt/iiiiibox
        run: |
          docker compose up -d postgres minio meilisearch
          # Wait for postgres to be ready
          sleep 10

      - name: Run database migrations (on host, not in container)
        working-directory: /opt/iiiiibox
        run: |
          PGUSER=$(grep "^POSTGRES_USER" .env | cut -d= -f2-)
          PGPASS=$(grep "^POSTGRES_PASSWORD" .env | cut -d= -f2-)
          PGDB=$(grep "^POSTGRES_DB" .env | cut -d= -f2-)
          export DATABASE_URL="postgresql://${PGUSER}:${PGPASS}@localhost:5433/${PGDB}"
          echo "Running migrations against localhost:5433/${PGDB}"
          pnpm --filter @iiiiibox/database exec prisma migrate deploy

      - name: Build and start app containers
        working-directory: /opt/iiiiibox
        run: |
          docker compose build --parallel api web
          docker compose up -d --remove-orphans
          docker image prune -f
          echo "Deploy complete at $(date)"
